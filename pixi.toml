[project]
name = "vortex-kernels"
version = "0.1.0"
description = "Optimized Triton inference kernels for Vortex/Evo2"
authors = ["AlphaKhaw"]
channels = ["nvidia", "conda-forge"]
platforms = ["linux-64"]

# Conda-forge / nvidia binaries. Biggest win: prebuilt transformer-engine-torch
# avoids a 10-20 min source compile on Lambda.
[dependencies]
python = "3.12.*"
cuda-nvcc = "12.8.*"
cuda-cudart-dev = "12.8.*"
cuda-version = "12.8.*"
transformer-engine-torch = "2.3.0"
ninja = "*"
packaging = "*"
git = "*"
pip = "*"

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]
no-build-isolation = ["flash-attn", "transformer_engine", "transformer_engine_torch"]

# Pins that must match the NGC 25.04 container used by Vortex + Evo2 Dockerfiles.
[pypi-dependencies]
torch = "==2.7.1"
flash-attn = "==2.8.0.post2"
huggingface_hub = ">=0.24,<0.27"
evo2 = ">=0.5.3"
biopython = "*"
vortex-kernels = { path = ".", editable = true }

[feature.dev.pypi-dependencies]
pytest = ">=8"
pytest-benchmark = "*"
ruff = ">=0.6"
pyright = ">=1.1"
nvtx = "*"

[feature.bench.pypi-dependencies]
matplotlib = "*"
pandas = "*"
torch-tb-profiler = "*"

[feature.flashfft.pypi-dependencies]
flash-fft-conv = { git = "https://github.com/HazyResearch/flash-fft-conv.git", subdirectory = "csrc/flashfftconv" }

[environments]
default = { features = ["dev", "bench"], solve-group = "main" }
full = { features = ["dev", "bench", "flashfft"], solve-group = "main" }

[tasks]
verify = "python scripts/verify_install.py"
test = "pytest tests/"
lint = "ruff check vortex_kernels tests benchmarks scripts"
format = "ruff format vortex_kernels tests benchmarks scripts"
typecheck = "pyright vortex_kernels"
profile = "python benchmarks/profile_evo2.py --model evo2_7b_base --seq-lens 8192 32768"
clone-vortex = "test -d $HOME/vortex || (git clone https://github.com/Zymrael/vortex.git $HOME/vortex && cd $HOME/vortex && git submodule update --init --recursive)"
