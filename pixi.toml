[workspace]
name = "vortex-kernels"
version = "0.1.0"
description = "Optimized Triton inference kernels for Vortex/Evo2"
authors = ["AlphaKhaw"]
channels = ["conda-forge"]
platforms = ["linux-64"]

# conda-forge in 2025 has full CUDA toolchain + pytorch + transformer-engine
# coverage for linux-64, so we don't need the nvidia channel. Adding nvidia
# with strict priority (the default) causes cross-channel dependency lockouts
# — nvidia has partial overlap but not all transitive deps (e.g., libcudss,
# _openmp_mutex), and strict priority blocks fallback to conda-forge for
# those. Single-channel keeps the solver unambiguous.

# Declare the host CUDA driver capability so conda's __cuda virtual package
# resolves during solve. Without this, GPU-built packages (pytorch cuda*,
# transformer-engine-torch) can't find the `__cuda *` dependency and the
# solve fails with "for which no candidates were found".
#
# "12" matches any CUDA 12.x driver (forward-compatible). Tighten to a
# specific minor (e.g., "12.9") only if a package requires it and the host
# actually supplies that version — check with `nvidia-smi` top-right.
[system-requirements]
cuda = "12"

# Conda-forge / nvidia binaries.
#
# Why pytorch is a conda dep, not a pypi dep: transformer-engine-torch on
# conda-forge has a `pytorch * cuda*` constraint that can only be satisfied
# by conda's pytorch package. A pip-installed torch is a different package in
# the solver's eyes and won't resolve. Keeping them co-located in conda also
# guarantees CUDA version alignment across the two.
#
# CUDA is pinned to 12.9 because the TE 2.3.0 py3.12 build on conda-forge
# requires cuda-cudart >=12.9.37.
[dependencies]
python = "3.12.*"
cuda-nvcc = "12.9.*"
cuda-cudart-dev = "12.9.*"
cuda-version = "12.9.*"
pytorch = { version = "2.7.*", build = "cuda*" }
transformer-engine-torch = "==2.3.0"
# Pin einops to match vtx 1.0.8's hard requirement. Without this, conda's
# solve picks einops 0.8.2, which then pins the pypi side to 0.8.2 and
# conflicts with vtx's own einops==0.8.1 constraint. Holding conda to 0.8.1
# propagates through and lets the pypi solve succeed.
einops = "==0.8.1"
ninja = "*"
packaging = "*"
git = "*"
pip = "*"

[pypi-options]
no-build-isolation = ["flash-attn", "transformer_engine", "transformer_engine_torch"]

[pypi-dependencies]
flash-attn = "==2.8.0.post2"
huggingface_hub = ">=0.24,<0.27"
evo2 = ">=0.5.3"
biopython = "*"
vortex-kernels = { path = ".", editable = true }

[feature.dev.pypi-dependencies]
pytest = ">=8"
pytest-benchmark = "*"
ruff = ">=0.6"
basedpyright = ">=1.28"
nvtx = "*"

[feature.bench.pypi-dependencies]
matplotlib = "*"
pandas = "*"
torch-tb-profiler = "*"

# FlashFFTConv is deferred. The package at github.com/HazyResearch/flash-fft-conv
# in `csrc/flashfftconv` installs as `monarch-cuda`, not `flash-fft-conv` — pip
# rejects the name mismatch. Add back as a separate optional feature when the
# Tier-2 benchmark needs it, using the correct package name.

[environments]
default = { features = ["dev", "bench"], solve-group = "main" }

[tasks]
verify = "python scripts/verify_install.py"
test = "pytest tests/"
lint = "ruff check vortex_kernels tests benchmarks scripts"
format = "ruff format vortex_kernels tests benchmarks scripts"
typecheck = "basedpyright vortex_kernels"
profile = "python -u benchmarks/profile_evo2.py --models evo2_7b_base --seq-lens 8192 32768"
clone-vortex = "test -d $HOME/vortex || (git clone https://github.com/Zymrael/vortex.git $HOME/vortex && cd $HOME/vortex && git submodule update --init --recursive)"
